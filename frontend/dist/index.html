<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <title>Natron IA</title>
  <style>
    /* Prevent white flash on load */
    html,
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      color: #f5f5f7;
    }

    #root {
      min-height: 100vh;
      background-color: #0a0a0a;
    }

    /* Loading spinner */
    .loading-spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid #1a1a1a;
      border-top: 3px solid #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      100% {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-CUX7n7QC.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-C4OmxFcx.css">
</head>

<body>
  <div id="root">
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;z-index:9999;">
      <div class="loading-spinner"></div>
      <p style="color:#00ff88;font-family:Inter,sans-serif;font-size:12px;margin-top:24px;letter-spacing:3px;text-transform:uppercase;opacity:0.8;">Carregando Natron IA...</p>
      <div id="recovery-zone" style="display:none;margin-top:20px;text-align:center;">
        <p style="color:#8e8e93;font-family:Inter,sans-serif;font-size:11px;margin-bottom:12px;">O sistema está demorando para responder.</p>
        <button id="btn-recovery" style="background:transparent;border:1px solid #00ff88;color:#00ff88;padding:8px 16px;border-radius:4px;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;">Limpar Cache e Forçar Atualização</button>
        <p style="color:#444;font-family:Inter,sans-serif;font-size:9px;margin-top:8px;">Sua sessão (login) será mantida.</p>
      </div>
    </div>
    <script>
      // Intelligent recovery mechanism
      setTimeout(function() {
        var zone = document.getElementById('recovery-zone');
        if (zone) zone.style.display = 'block';
      }, 6000);

      document.getElementById('btn-recovery').addEventListener('click', async function() {
        this.innerText = 'LIMPANDO...';
        this.disabled = true;
        
        try {
          // 1. Unregister Service Workers
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            for(let reg of regs) await reg.unregister();
          }
          
          // 2. Clear Cache Storage
          if ('caches' in window) {
            const names = await caches.keys();
            for(let name of names) await caches.delete(name);
          }

          // 3. Force reload (keeping LocalStorage/SessionStorage)
          window.location.reload(true);
        } catch (e) {
          window.location.reload();
        }
      });
    </script>
  </div>
</body>

</html>
